<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenInterview Backend</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe6;
        --panel: #fffaf2;
        --text: #1f2933;
        --muted: #52606d;
        --accent: #a03c2f;
        --border: rgba(31, 41, 51, 0.12);
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(160, 60, 47, 0.14), transparent 28%),
          linear-gradient(180deg, #f8f3eb, var(--bg));
        color: var(--text);
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 32px;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 2rem;
      }

      p,
      li {
        line-height: 1.7;
        color: var(--muted);
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(31, 41, 51, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OpenInterview Backend</h1>
      <p>后端 MVP 已初始化。启动 Go 服务后，使用 <code>POST /api/sessions</code> 创建会话，并通过 <code>SSE</code> 订阅实时事件。</p>
      <ul>
        <li>固定音频格式：16kHz / mono / PCM16</li>
        <li>支持 partial / final 转写事件</li>
        <li>支持问题识别、上下文保留、流式回答、中断旧回答</li>
        <li>支持候选人资料配置和调试注入转写</li>
      </ul>
    </main>
  </body>
</html>
